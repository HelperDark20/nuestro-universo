<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nuestro Universo 💫</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #020510;
    font-family: 'Inter', sans-serif;
  }

  /* ---- INTRO SCREEN ---- */
  #intro {
    position: fixed; inset: 0; z-index: 100;
    background: #020510;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
    transition: opacity 1s ease;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }

  .intro-names {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 300;
    color: #fff;
    letter-spacing: 0.05em;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }
  .intro-amp {
    color: #c084fc;
    font-style: italic;
  }
  .intro-sub {
    font-size: 0.75rem;
    color: #6b7280;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }
  .counter-row {
    display: flex; gap: 1.5rem; margin-bottom: 3rem;
  }
  .counter-item {
    text-align: center;
  }
  .counter-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    color: #c084fc;
    font-weight: 300;
    line-height: 1;
  }
  .counter-label {
    font-size: 0.6rem;
    color: #6b7280;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }
  .enter-btn {
    background: transparent;
    border: 1px solid rgba(192,132,252,0.4);
    color: #c084fc;
    padding: 0.8rem 2.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.3s;
    font-family: 'Inter', sans-serif;
  }
  .enter-btn:hover { background: rgba(192,132,252,0.1); border-color: #c084fc; }

  /* ---- GALAXY ---- */
  #galaxy {
    position: fixed; inset: 0;
    overflow: hidden;
    cursor: grab;
    opacity: 0;
    transition: opacity 1.5s ease 0.5s;
  }
  #galaxy.visible { opacity: 1; }
  #galaxy:active { cursor: grabbing; }

  #space {
    position: absolute;
    width: 280vw; height: 280vh;
    top: -90vh; left: -90vw;
    background: radial-gradient(ellipse at 40% 50%, #0d0520 0%, #020510 60%);
  }

  /* bg stars */
  .bg-star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--o, 0.4); transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* nebula */
  .nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.12;
    pointer-events: none;
  }

  /* memory stars */
  .star, .star-center {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, #c084fc 40%, transparent 70%);
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pulse 3s ease-in-out infinite;
  }
  .star-center {
    background: radial-gradient(circle, #fff 0%, #f9a8d4 30%, #c084fc 60%, transparent 75%);
    animation: pulse-center 2.5s ease-in-out infinite;
  }
  .star:hover, .star-center:hover {
    transform: translate(-50%, -50%) scale(1.6);
  }
  @keyframes pulse {
    0%,100% { opacity: 0.8; box-shadow: 0 0 20px rgba(192,132,252,0.3); }
    50% { opacity: 1; box-shadow: 0 0 35px rgba(192,132,252,0.6); }
  }
  @keyframes pulse-center {
    0%,100% { opacity: 0.9; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
  }

  /* hint */
  #hint {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem; color: rgba(255,255,255,0.3);
    letter-spacing: 0.15em; text-transform: uppercase;
    pointer-events: none;
    animation: fadeHint 6s ease 2s forwards;
  }
  @keyframes fadeHint {
    0% { opacity:1 } 70% { opacity:1 } 100% { opacity:0 }
  }

  /* ---- CARD MODAL ---- */
  #overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(2,5,16,0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #overlay.open { opacity: 1; pointer-events: all; }

  #card {
    width: 100%; max-width: 480px;
    background: linear-gradient(160deg, #0d0a1f 0%, #080415 100%);
    border: 1px solid rgba(192,132,252,0.15);
    border-radius: 24px 24px 0 0;
    padding: 1.5rem 1.5rem 2.5rem;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 90vh;
    overflow-y: auto;
  }
  #overlay.open #card { transform: translateY(0); }

  .card-handle {
    width: 40px; height: 4px;
    background: rgba(192,132,252,0.3);
    border-radius: 2px;
    margin: 0 auto 1.2rem;
  }
  .card-date {
    font-size: 0.6rem; color: #c084fc;
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem; font-weight: 300;
    color: #fff; line-height: 1.2;
    margin-bottom: 1rem;
  }
  .card-img {
    width: 100%; border-radius: 12px;
    margin-bottom: 1rem;
    object-fit: cover;
    max-height: 320px;
    display: block;
    border: 1px solid rgba(192,132,252,0.1);
  }
  .card-text {
    font-size: 0.88rem; color: rgba(255,255,255,0.7);
    line-height: 1.7; font-weight: 300;
  }
  .card-close {
    position: absolute; top: 1rem; right: 1.2rem;
    background: none; border: none;
    color: rgba(255,255,255,0.3); font-size: 1.5rem;
    cursor: pointer; padding: 0.2rem 0.5rem;
  }
  #card { position: relative; }

  /* nav arrows */
  .card-nav {
    display: flex; justify-content: space-between;
    margin-top: 1.5rem;
  }
  .nav-btn {
    background: rgba(192,132,252,0.1);
    border: 1px solid rgba(192,132,252,0.2);
    color: #c084fc; font-size: 0.7rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.5rem 1rem; border-radius: 20px;
    cursor: pointer; transition: all 0.2s;
  }
  .nav-btn:hover { background: rgba(192,132,252,0.2); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  /* scrollbar */
  #card::-webkit-scrollbar { width: 3px; }
  #card::-webkit-scrollbar-track { background: transparent; }
  #card::-webkit-scrollbar-thumb { background: rgba(192,132,252,0.3); border-radius: 2px; }
</style>
</head>

let currentCard = 0;

// Counter
function updateCounter() {
  const start = new Date('2025-08-07T00:00:00');
  const now = new Date();
  const diff = now - start;
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  document.getElementById('cnt-d').textContent = days;
  document.getElementById('cnt-h').textContent = String(hours).padStart(2,'0');
  document.getElementById('cnt-m').textContent = String(mins).padStart(2,'0');
  document.getElementById('cnt-s').textContent = String(secs).padStart(2,'0');
}
updateCounter();
setInterval(updateCounter, 1000);

// Enter galaxy
function enterGalaxy() {
  document.getElementById('intro').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('galaxy').classList.add('visible');
    generateBgStars();
    initDrag();
    centerGalaxy();
  }, 1000);
}

// Center galaxy on load
function centerGalaxy() {
  const space = document.getElementById('space');
  const sw = space.offsetWidth, sh = space.offsetHeight;
  const vw = window.innerWidth, vh = window.innerHeight;
  posX = (vw - sw) / 2 + vw * 0.4;
  posY = (vh - sh) / 2 + vh * 0.4;
  space.style.transform = `translate(${posX}px, ${posY}px)`;
}

// BG stars
function generateBgStars() {
  const space = document.getElementById('space');
  for (let i = 0; i < 300; i++) {
    const s = document.createElement('div');
    s.className = 'bg-star';
    const sz = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--o:${(Math.random()*0.5+0.2).toFixed(2)};animation-delay:${(Math.random()*4).toFixed(1)}s`;
    space.insertBefore(s, space.firstChild);
  }
}

// Drag
let isDragging = false, startX, startY, posX = 0, posY = 0;
function initDrag() {
  const galaxy = document.getElementById('galaxy');
  const space = document.getElementById('space');
  
  function onStart(e) {
    isDragging = true;
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX - posX;
    startY = pt.clientY - posY;
  }
  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    posX = pt.clientX - startX;
    posY = pt.clientY - startY;
    space.style.transform = `translate(${posX}px, ${posY}px)`;
  }
  function onEnd() { isDragging = false; }
  
  galaxy.addEventListener('mousedown', onStart);
  galaxy.addEventListener('mousemove', onMove);
  galaxy.addEventListener('mouseup', onEnd);
  galaxy.addEventListener('touchstart', onStart, {passive:true});
  galaxy.addEventListener('touchmove', onMove, {passive:false});
  galaxy.addEventListener('touchend', onEnd);
}

// Cards
function openCard(i) {
  currentCard = i;
  renderCard();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('card').scrollTop = 0;
}
function renderCard() {
  const c = cards[currentCard];
  document.getElementById('c-date').textContent = c.icon + '  ' + c.date;
  document.getElementById('c-title').textContent = c.title;
  document.getElementById('c-img').src = c.img;
  document.getElementById('c-text').textContent = c.text;
  document.getElementById('btn-prev').disabled = currentCard === 0;
  document.getElementById('btn-next').disabled = currentCard === cards.length - 1;
  document.getElementById('card').scrollTop = 0;
}
function closeCard() {
  document.getElementById('overlay').classList.remove('open');
}
function closeCardIfOutside(e) {
  if (e.target === document.getElementById('overlay')) closeCard();
}
function navigateCard(dir) {
  currentCard = Math.max(0, Math.min(cards.length-1, currentCard + dir));
  renderCard();
}

// Swipe to close
let touchStartY = 0;
document.getElementById('card').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
});
document.getElementById('card').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientY - touchStartY;
  if (diff > 80 && document.getElementById('card').scrollTop === 0) closeCard();
});
</script>
